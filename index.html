<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TGD Network – Final AI MVP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:'Segoe UI',Arial; margin:0; padding:10px; background:#eef2f7;}
h1,h2 { margin:0 0 10px 0; color:#1e293b; }
.card { background:#fff; padding:20px; border-radius:15px; margin:10px 0; box-shadow:0 6px 15px rgba(0,0,0,0.1);}
.devices { display:flex; flex-wrap:wrap; gap:15px; }
.device { flex:1 1 120px; padding:15px; border-radius:10px; text-align:center; background:linear-gradient(135deg,#c7d2fe,#e0f2fe); box-shadow:0 2px 8px rgba(0,0,0,0.1); position:relative; }
.device .multiplier { font-weight:bold; color:#1e40af; animation: pulse 1s infinite alternate; }
@keyframes pulse { 0%{transform:scale(1)} 100%{transform:scale(1.1)} }
.device button { margin-top:10px; padding:5px 10px; border:none; border-radius:5px; background:#4f46e5; color:#fff; cursor:pointer; }
.device button:hover { background:#3730a3; }
.admin input { padding:5px; border-radius:5px; border:1px solid #ccc; margin-bottom:5px; width:100%; }
.admin button { margin:2px 0; padding:5px 10px; border:none; border-radius:5px; background:#2563eb; color:#fff; cursor:pointer; }
.admin button:hover { background:#1d4ed8; }
.earnings { font-size:1.5em; color:#1e3a8a; font-weight:bold; }
@media(max-width:600px){ .devices { flex-direction: column; } }
</style>
</head>
<body>

<h1>TGD Network – Final AI MVP</h1>
<div id="welcome"></div>

<div class="card">
<h2>Devices</h2>
<div class="devices" id="devices"></div>
</div>

<div class="card">
<h2>Earnings</h2>
<p>💰 Your Earnings: <span id="earnings" class="earnings">0</span></p>
<p>🌐 Network Earnings: <span id="networkEarnings" class="earnings">0</span></p>
</div>

<div class="card admin">
<h2>Admin Panel</h2>
<input type="text" id="newUser" placeholder="New Username">
<button onclick="addUser()">Add User</button>
<button onclick="removeUser()">Remove User</button>
<button onclick="resetEarnings()">Reset Earnings</button>
<button onclick="toggleLeaderboard()">Toggle Leaderboard</button>
<p>Users added will appear for device login.</p>
</div>

<div class="card" id="leaderboardCard" style="display:none;">
<h2>Leaderboard</h2>
<ul id="leaderboard"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
