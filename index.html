<!DOCTYPE html>
<html>
<head>
  <title>TGD Network MVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      text-align: center;
      padding: 50px;
    }

    h1 { color: #007bff; margin-bottom: 20px; }

    #loginBox, #app {
      background: #fff;
      display: inline-block;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 220px;
      margin-right: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      margin: 5px;
    }

    button:hover { background-color: #0056b3; }

    #status { margin-top: 20px; font-weight: bold; color: #555; }
    #earn { font-size: 28px; color: #28a745; font-weight: bold; margin-top: 10px; }
    #devices { margin-top: 20px; }
    .device {
      display: inline-block;
      background: #e3f2fd;
      padding: 8px 12px;
      border-radius: 10px;
      margin: 5px;
      font-weight: bold;
    }

    .multiplier { color: #ff5722; font-weight: bold; margin-left: 8px; }

    #topEarners {
      margin-top: 30px;
      text-align: left;
      display: inline-block;
      background: #fff3e0;
      padding: 15px;
      border-radius: 10px;
      width: 220px;
    }

    #topEarners h3 { margin-top: 0; color: #ff9800; }
  </style>
</head>
<body>

  <h1>TGD Network</h1>

  <!-- LOGIN -->
  <div id="loginBox">
    <input type="text" id="username" placeholder="Enter Username">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="app" style="display:none;">
    <h3>Welcome, <span id="user"></span></h3>

    <button onclick="connect()">Connect Device</button>
    <p id="status">Not Connected <span class="multiplier" id="multiplier"></span></p>

    <div id="devices"></div>

    <h2>💰 Earnings: <span id="earn">0</span></h2>

    <div id="topEarners">
      <h3>Top Earners</h3>
      <ul id="earnersList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
